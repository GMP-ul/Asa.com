<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAGEGRID | Create Account</title>
    <link rel="stylesheet" href="create_acc.css">
</head>
<body>
    <main class="login-container">
        <div class="login-card">
            <header class="logo">
                <img src="final logo 1.png" alt="PAGEGRID Logo" class="logo-img">
            </header>

            <h1>Welcome to ASA!</h1>
            <p class="subtitle">Please enter your details to create an account.</p>

            <form>
                <div class="input-group">
                    <input type="text" id="first-name" placeholder="First Name" required>
                    <input type="text" id="last-name" placeholder="Last Name" required>
                    <input type="email" id="email" placeholder="Email" required>
                    <input type="password" id="password" placeholder="Password" required>
                    <select id="role" required>
                        <option value="" disabled selected>Select your Role</option>
                        <option value="student">Student</option>
                        <option value="staff">Staff</option>
                        <option value="admin">Admin</option>
                        <option value="visitor">Visitor</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit">CREATE ACCOUNT</button>
            </form>

            <footer class="links">
                <p class="terms-text">
                    Signing up for a ASA (lost & found) account means you agree to the 
                    <a href="privacy.html" class="policy-link">Privacy Policy</a> and 
                    <a href="privacy.html" class="policy-link">Terms of Service</a>.
                </p>

                <a href="login.html">Already have an account? <strong>Log in</strong></a>
            </footer>
        </div>
    </main>
</body>
</html>
